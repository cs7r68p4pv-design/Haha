        :root {
            --bg-color: #0b111e;

            --primary-gradient: linear-gradient(135deg, #00b4db, #0083b0);
            --verify-gradient: linear-gradient(135deg, #11998e, #38ef7d);
            --glow-color: rgba(0, 180, 219, 0.4);
            --text-main: #ffffff;
            --text-muted: #8a99ad;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 10px;
        }

        .store-title {
            font-size: 2.2rem;
            font-weight: bold;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-transform: lowercase; /* للتأكد من بقائها بحروف صغيرة */
        }

        .store-subtitle {
            color: var(--text-muted);

        /* App Info Card Box */
        .app-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 0 25px var(--glow-color), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border: 2px solid #00b4db;
            transition: transform 0.3s ease;
        }

        .app-icon {
            width: 130px;
            height: 130px;
            border-radius: 28px;
            margin-bottom: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            object-fit: cover;
        }

        .app-meta {
            display: flex;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .app-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .app-version {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-download {
            background: var(--primary-gradient);
            box-shadow: 0 6px 20px rgba(0, 180, 219, 0.4);
        }

        .btn-download:hover {
            box-shadow: 0 8px 25px rgba(0, 180, 219, 0.6);
            transform: scale(1.02);
        }

        .btn-verify {
            background: var(--verify-gradient);
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.4);
        }

        .btn-verify:hover {
            box-shadow: 0 8px 25px rgba(56, 239, 125, 0.6);
            transform: scale(1.02);
        }

        /* Popup / Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 17, 30, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 380px;
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transform: scale(0.8);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-title {
            font-size: 1.5rem;
            margin: 15px 0 10px 0;
        }

        .modal-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }
    </style>
</head>

    <div id="main-download-section">
